name: Update VIOS website publications (PR)

on:
  workflow_dispatch: {}
  # schedule:
  #   # Every ~15 days (twice a month)
  #   - cron: "0 2 1,16 * *"   # 02:00 UTC on the 1st and 16th

permissions:
  contents: read

concurrency:
  group: publications-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      WEBSITE_REPO: vios-s/vios.science
      WEBSITE_BRANCH: main
      UPDATE_BRANCH: publications-update
      TARGET_INCLUDE_PATH: src/data/publications.yaml

    steps:
      - name: Checkout publication-lists repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate publications
        env:
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        run: |
          python generate_lists.py --format yaml --group VIOS
          test -f output/vios_publications.yaml

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WEBSITE_REPO }}
          ref: ${{ env.WEBSITE_BRANCH }}
          path: website
          token: ${{ secrets.WEBSITE_REPO_PAT }}

      - name: Merge generated publications preserving existing images
        run: |
          mkdir -p "website/$(dirname "${TARGET_INCLUDE_PATH}")"
          python - <<'PY'
          from pathlib import Path
          import re
          import yaml

          generated_path = Path("output/vios_publications.yaml")
          target_path = Path("website/${TARGET_INCLUDE_PATH}")

          def normalize_title(value):
              if value is None:
                  return ""
              value = str(value).strip().lower()
              return re.sub(r"\s+", " ", value)

          def normalize_date(value):
              if value is None:
                  return ""
              return str(value).strip()

          def publication_key(publication):
              return f"{normalize_title(publication.get('title'))}|{normalize_date(publication.get('date'))}"

          with generated_path.open("r", encoding="utf-8") as fh:
              generated_publications = yaml.safe_load(fh) or []

          existing_publications = []
          if target_path.exists():
              with target_path.open("r", encoding="utf-8") as fh:
                  existing_publications = yaml.safe_load(fh) or []

          existing_images = {}
          for publication in existing_publications:
              key = publication_key(publication)
              image = publication.get("image")
              if image not in (None, ""):
                  existing_images[key] = image

          preserved_count = 0
          for publication in generated_publications:
              key = publication_key(publication)
              existing_image = existing_images.get(key)
              if existing_image is not None:
                  publication["image"] = existing_image
                  preserved_count += 1

          with target_path.open("w", encoding="utf-8") as fh:
              yaml.safe_dump(generated_publications, fh, sort_keys=False, allow_unicode=True)

          print(
              f"Merged {len(generated_publications)} publications; "
              f"preserved {preserved_count} existing image path(s)."
          )
          PY

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v8
        with:
          path: website
          token: ${{ secrets.WEBSITE_REPO_PAT }}
          add-paths: |
            ${{ env.TARGET_INCLUDE_PATH }}
          commit-message: Update publications list
          branch: ${{ env.UPDATE_BRANCH }}
          base: ${{ env.WEBSITE_BRANCH }}
          title: Update publications
          body: |
            Automated update of `src/data/publications.yaml` generated from OpenAlex.

            ✅ If everything looks correct:
            - Approve and merge this PR.

            ❌ If there are incorrect publications:
            - Do NOT merge this PR.
            - Go to the repository: https://github.com/vios-s/publication-lists
            - Add the incorrect DOIs to `excluded_dois.yaml`.
            - Then navigate to:
                Actions → "Update VIOS website publications (PR)" → Run workflow
            - Review the updated PR again once it regenerates.
          labels: |
            publications
            automated
          delete-branch: false
