<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{group} Publications</title>
    <style>
        body {{
            font-family: -apple-system, BlinkMacSystemFont,
                         'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }}
        .publication {{
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }}
        .publication:last-child {{
            border-bottom: none;
        }}
        .title {{
            font-size: 1.1em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }}
        .title a {{
            color: #2c3e50;
            text-decoration: none;
        }}
        .title a:hover {{
            color: #3498db;
            text-decoration: underline;
        }}
        .authors {{
            color: #555;
            margin-bottom: 5px;
        }}
        .venue {{
            color: #666;
            font-style: italic;
            margin-bottom: 5px;
        }}
        .meta {{
            color: #888;
            font-size: 0.9em;
        }}
        .badge {{
            display: inline-block;
            padding: 3px 8px;
            margin-right: 6px;
            font-size: 0.75em;
            font-weight: 600;
            border-radius: 3px;
            text-transform: uppercase;
        }}
        .badge-accepted {{
            background-color: #fff3cd;
            color: #856404;
        }}
        .badge-published {{
            background-color: #d4edda;
            color: #155724;
        }}
        .badge-preprint {{
            background-color: #e7f3ff;
            color: #004085;
        }}
        .year-section {{
            margin-top: 40px;
        }}
        .year-header {{
            font-size: 1.5em;
            font-weight: 700;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }}
    </style>
</head>
<body>
    <h1>{group} Publications</h1>
    <p>Last updated: {last_updated}</p>
    <p>Total publications: {total_publications}</p>
{publications_by_year}
</body>
</html>
